<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Petitioners</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Petitioners</h2>

<div class="mb-3">
    <a th:href="@{/petitioners/new}" class="btn btn-primary">Register New Petitioner</a>
    <a th:href="@{/cases}" class="btn btn-outline-secondary">← Cases</a>
</div>

<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Type</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${petitioners}">
        <td th:text="${p.petitionerId}"></td>
        <td th:text="${p.petitionerName}"></td>
        <td th:text="${p.petitionerType}"></td>
        <td>
            <form th:action="@{/petitioners/delete/{id}(id=${p.petitionerId})}"
                  method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-danger"
                        onclick="return confirm('Delete petitioner ' + [[${p.petitionerId}]] + '?')">
                    Delete
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
