<!DOCTYPE html>
<html th:replace="~{common/layout :: layout(~{::title}, ~{::header}, ~{::section})}" lang="en"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Item Form</title>
</head>
<body>
<header th:text="${pageTitle}">Item Form</header>

<section>
    <form class="row g-3" method="post" th:action="${formAction}" th:object="${itemForm}">
        <div class="col-12">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" id="name" required th:field="*{name}" th:classappend="${#fields.hasErrors('name')} ? ' is-invalid'" type="text">
            <div class="invalid-feedback" th:errors="*{name}">Name error</div>
        </div>

        <div class="col-12">
            <label class="form-label" for="description">Description</label>
            <textarea class="form-control" id="description" rows="5"
                      th:field="*{description}" th:classappend="${#fields.hasErrors('description')} ? ' is-invalid'"></textarea>
            <div class="invalid-feedback" th:errors="*{description}">Description error</div>
        </div>

        <div class="col-md-4">
            <label class="form-label" for="price">Price</label>
            <input class="form-control" id="price" min="0" required step="0.01"
                   th:field="*{price}" th:classappend="${#fields.hasErrors('price')} ? ' is-invalid'" type="number">
            <div class="invalid-feedback" th:errors="*{price}">Price error</div>
        </div>

        <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary" th:text="${submitLabel}" type="submit">Save</button>
            <a class="btn btn-outline-secondary" th:href="@{/item}">Cancel</a>
        </div>
    </form>
</section>
</body>
</html>
