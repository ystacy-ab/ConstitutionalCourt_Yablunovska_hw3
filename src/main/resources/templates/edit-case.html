<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Case</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Edit Case</h2>
<form th:action="@{/cases/update}" th:object="${courtCase}" method="post" class="col-md-6">
    <input type="hidden" th:field="*{caseNumber}"/>

    <div class="mb-3">
        <label class="form-label">Case Number:</label>
        <input type="text" th:value="${courtCase.caseNumber}" class="form-control" readonly>
    </div>
    <div class="mb-3">
        <label class="form-label">Case Title:</label>
        <input type="text" th:field="*{caseTitle}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Filing Date:</label>
        <input type="date" th:field="*{filingDate}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Status:</label>
        <select th:field="*{status}" class="form-select">
            <option value="OPEN">OPEN</option>
            <option value="PENDING">PENDING</option>
            <option value="CLOSED">CLOSED</option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Petitioner:</label>
        <select th:field="*{petitionerId}" class="form-select" required>
            <option th:each="p : ${petitioners}"
                    th:value="${p.petitionerId}"
                    th:text="${p.petitionerName + ' (' + p.petitionerType + ')'}">
            </option>
        </select>
    </div>
    <button type="submit" class="btn btn-success">Update Case</button>
    <a th:href="@{/cases}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
