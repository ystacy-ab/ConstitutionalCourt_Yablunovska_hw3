<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Court Ruling</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Add Court Ruling</h2>
<p class="text-muted">Submitting this form will record the verdict and automatically
    set the case status to <strong>CLOSED</strong>.</p>

<form th:action="@{/rulings}" th:object="${ruling}" method="post" class="col-md-6">

    <div class="mb-3">
        <label class="form-label">Ruling ID:</label>
        <input type="number" th:field="*{rulingId}" class="form-control"
               required placeholder="e.g. 5">
    </div>
    <div class="mb-3">
        <label class="form-label">Case:</label>
        <select th:field="*{caseNumber}" class="form-select" required>
            <option value="">-- Select Case --</option>
            <option th:each="c : ${cases}"
                    th:value="${c.caseNumber}"
                    th:text="${c.caseNumber + ' — ' + c.caseTitle}">
            </option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Verdict Date:</label>
        <input type="date" th:field="*{verdictDate}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Verdict Text:</label>
        <textarea th:field="*{verdictText}" class="form-control" rows="4"
                  required placeholder="Enter the court's decision..."></textarea>
    </div>

    <button type="submit" class="btn btn-success">Save Ruling</button>
    <a th:href="@{/rulings}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
