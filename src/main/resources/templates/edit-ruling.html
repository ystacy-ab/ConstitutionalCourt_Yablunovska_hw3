<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Ruling</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Edit Ruling</h2>
<form th:action="@{/rulings/update}" th:object="${ruling}" method="post" class="col-md-6">
    <input type="hidden" th:field="*{rulingId}"/>

    <div class="mb-3">
        <label class="form-label">Ruling ID:</label>
        <input type="text" th:value="${ruling.rulingId}" class="form-control" readonly>
    </div>
    <div class="mb-3">
        <label class="form-label">Case:</label>
        <select th:field="*{caseNumber}" class="form-select" required>
            <option th:each="c : ${cases}"
                    th:value="${c.caseNumber}"
                    th:text="${c.caseNumber + ' — ' + c.caseTitle}">
            </option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Verdict Date:</label>
        <input type="date" th:field="*{verdictDate}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Verdict Text:</label>
        <textarea th:field="*{verdictText}" class="form-control" rows="4" required></textarea>
    </div>

    <button type="submit" class="btn btn-success">Update Ruling</button>
    <a th:href="@{/rulings}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
