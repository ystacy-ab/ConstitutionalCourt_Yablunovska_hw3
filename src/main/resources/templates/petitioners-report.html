<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Petitioners Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 class="mb-4" th:text="${reportTitle}">Petitioners Registry</h2>

<div class="mb-3">
    <a th:href="@{/cases}" class="btn btn-outline-secondary">← Back</a>
    <button onclick="window.print()" class="btn btn-dark">Download PDF</button>
</div>

<table class="table table-bordered table-striped shadow-sm">
    <thead class="table-info">
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Type</th>
        <th>Identification (Passport/Reg. No)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${petitioners}">
    <td th:text="${p.petitionerId}"></td>
    <td th:text="${p.petitionerName}" class="fw-bold"></td>
    <td>
    <span th:text="${p.petitionerType}"
      th:classappend="${p.petitionerType == 'Individual' ? 'text-primary' : 'text-success'}">
    </span>
    </td>
    <td>
    <span th:text="${p.passportId != null ? 'Passport: ' + p.passportId : 'Reg. No: ' + p.registrationNumber}"></span>
    </td>
    </tr>
    </tbody>
</table>
</body>
</html>
