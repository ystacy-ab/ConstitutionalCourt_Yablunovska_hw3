<!DOCTYPE html>
<html th:fragment="layout (title, page_header, content)" xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <title th:replace="${title}">Layout Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/item}">Spring MVC Template</a>
        <span class="navbar-text text-body-secondary">Single-entity CRUD app</span>
    </div>
</nav>

<div class="container py-4 py-lg-5">
    <div class="row justify-content-center">
        <div class="col-12 col-xxl-11">
            <div class="card shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="mb-4">
                        <p class="text-uppercase text-body-secondary small fw-semibold mb-2">Simple Starter</p>
                        <h1 class="display-6 mb-0"><span th:replace="${page_header}">Page header</span></h1>
                    </div>

                    <div class="alert alert-success alert-dismissible fade show" role="alert" th:if="${successMessage}">
                        <span th:text="${successMessage}">Action completed successfully.</span>
                        <button aria-label="Close" class="btn-close" data-bs-dismiss="alert" type="button"></button>
                    </div>

                    <div class="alert alert-danger alert-dismissible fade show" role="alert" th:if="${errorMessage}">
                        <span th:text="${errorMessage}">Something went wrong.</span>
                        <button aria-label="Close" class="btn-close" data-bs-dismiss="alert" type="button"></button>
                    </div>

                    <div th:replace="${content}">
                        <div class="container px-10">Layout content</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
