<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Hearing</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Edit Hearing</h2>
<form th:action="@{/hearings/update}" th:object="${hearing}" method="post" class="col-md-6">
    <input type="hidden" th:field="*{hearingId}"/>

    <div class="mb-3">
        <label class="form-label">Hearing ID:</label>
        <input type="text" th:value="${hearing.hearingId}" class="form-control" readonly>
    </div>
    <div class="mb-3">
        <label class="form-label">Case:</label>
        <select th:field="*{caseNumber}" class="form-select" required>
            <option th:each="c : ${cases}"
                    th:value="${c.caseNumber}"
                    th:text="${c.caseNumber + ' — ' + c.caseTitle}">
            </option>
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Hearing Date:</label>
        <input type="date" th:field="*{hearingDate}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Location:</label>
        <input type="text" th:field="*{location}" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success">Update Hearing</button>
    <a th:href="@{/hearings}" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
