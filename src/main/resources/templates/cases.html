<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Constitutional Court - Cases</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Constitutional Court Cases</h2>
<table class="table table-striped">
    <thead>
    <tr>
        <th>Case #</th>
        <th>Title</th>
        <th>Filing Date</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${cases}">
        <td th:text="${c.caseNumber}"></td>
        <td th:text="${c.caseTitle}"></td>
        <td th:text="${c.filingDate}"></td>
        <td th:text="${c.status}"></td>
    </tr>
    </tbody>
</table>
<a th:href="@{/cases/new}" class="btn btn-primary">Register New Case</a>
</body>
</html>
