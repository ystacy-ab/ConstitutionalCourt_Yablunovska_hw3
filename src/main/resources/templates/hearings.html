<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hearing Schedule</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Hearing Schedule</h2>

<div class="mb-3">
    <a th:href="@{/hearings/new}" class="btn btn-primary">Schedule New Hearing</a>
    <a th:href="@{/cases}" class="btn btn-outline-secondary">← Cases</a>
    <a th:href="@{/rulings}" class="btn btn-outline-secondary">Court Rulings</a>
    <a th:href="@{/reports/hearings}" class="btn btn-info text-white">Hearing Notice Report</a>
</div>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Hearing ID</th>
        <th>Date</th>
        <th>Location</th>
        <th>Case Title</th>
        <th>Judge</th>
        <th>Petitioner</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${hearings}">
        <td th:text="${h.hearing_id}"></td>
        <td th:text="${h.hearing_date}"></td>
        <td th:text="${h.location}"></td>
        <td th:text="${h.case_title}"></td>
        <td th:text="${h.judge_name}"></td>
        <td th:text="${h.petitioner_name}"></td>
        <td>
            <a th:href="@{/hearings/edit/{id}(id=${h.hearing_id})}"
               class="btn btn-sm btn-warning">Edit</a>
            <form th:action="@{/hearings/delete/{id}(id=${h.hearing_id})}"
                  method="post" style="display:inline">
                <button type="submit" class="btn btn-sm btn-danger"
                        onclick="return confirm('Delete hearing ' + [[${h.hearing_id}]] + '?')">
                    Delete
                </button>
            </form>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
