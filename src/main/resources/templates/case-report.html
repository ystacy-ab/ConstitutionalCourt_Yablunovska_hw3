<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Constitutional Court - Reports</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 class="mb-4">Case Registration Report</h2>

<div class="mb-3">
    <a th:href="@{/cases}" class="btn btn-outline-secondary">← Back to Cases</a>
    <button onclick="window.print()" class="btn btn-primary">Print to PDF</button>
</div>

<table class="table table-striped">
    <thead class="table-primary">
    <tr>
        <th>Case Number</th>
        <th>Title</th>
        <th>Filing Date</th>
        <th>Petitioner</th>
        <th>Status</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${cases.empty}">
        <td colspan="5" class="text-center">No cases found for this report.</td>
    </tr>
    <tr th:each="c : ${cases}">
        <td th:text="${c.caseNumber}"></td>
        <td th:text="${c.caseTitle}"></td>
        <td th:text="${c.filingDate}"></td>
        <td th:text="${c.petitionerName}"></td>
        <td>
            <span th:text="${c.status}"
                  th:classappend="${c.status == 'CLOSED' ? 'badge bg-secondary' : 'badge bg-success'}">
                    </span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
