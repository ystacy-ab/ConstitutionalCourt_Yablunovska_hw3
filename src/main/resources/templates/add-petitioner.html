<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register New Petitioner</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2>Register New Petitioner</h2>

<form th:action="@{/petitioners}" method="post" class="col-md-6">

    <div class="mb-3">
        <label class="form-label">Petitioner ID:</label>
        <input type="number" name="petitionerId" class="form-control"
               required placeholder="e.g. 4">
    </div>
    <div class="mb-3">
        <label class="form-label">Petitioner Name:</label>
        <input type="text" name="petitionerName" class="form-control"
               required placeholder="Full name or organization name">
    </div>
    <div class="mb-3">
        <label class="form-label">Type:</label>
        <select name="petitionerType" class="form-select" required
                onchange="toggleIdField(this.value)">
            <option value="Individual">Individual</option>
            <option value="Organization">Organization</option>
        </select>
    </div>

    <!-- Shown when Individual -->
    <div class="mb-3" id="passportField">
        <label class="form-label">Passport ID:</label>
        <input type="text" name="passportId" class="form-control"
               placeholder="e.g. AB123456">
    </div>

    <!-- Shown when Organization -->
    <div class="mb-3" id="regNumberField" style="display:none">
        <label class="form-label">Registration Number:</label>
        <input type="text" name="registrationNumber" class="form-control"
               placeholder="e.g. 00012345">
    </div>

    <button type="submit" class="btn btn-success">Save Petitioner</button>
    <a th:href="@{/petitioners}" class="btn btn-secondary">Cancel</a>
</form>

<script>
    function toggleIdField(type) {
        document.getElementById('passportField').style.display =
            type === 'Individual' ? 'block' : 'none';
        document.getElementById('regNumberField').style.display =
            type === 'Organization' ? 'block' : 'none';
    }
</script>
</body>
</html>
