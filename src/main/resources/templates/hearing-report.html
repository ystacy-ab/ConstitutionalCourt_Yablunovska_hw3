<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hearing Notice Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
<h2 class="mb-4">Hearing Notice (Official Schedule)</h2>
<div class="mb-3">
    <a th:href="@{/hearings}" class="btn btn-outline-secondary">← Back</a>
    <button onclick="window.print()" class="btn btn-primary">Print Notices</button>
</div>
<table class="table table-bordered table-striped shadow-sm">
    <thead class="table-info">
    <tr>
        <th>ID</th><th>Date</th><th>Location</th><th>Case Title</th><th>Judge</th><th>Petitioner</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="h : ${hearings}">
        <td th:text="${h.hearingId}"></td>
        <td th:text="${h.hearingDate}"></td>
        <td th:text="${h.location}"></td>
        <td th:text="${h.caseTitle}"></td>
        <td th:text="${h.judgeName}"></td>
        <td th:text="${h.petitionerName}"></td>
    </tr>
    </tbody>
</table>
</body>
</html>
